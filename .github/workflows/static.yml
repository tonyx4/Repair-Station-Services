name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Esto le dice a GitHub que use la carpeta frontend
          # Quitamos el ./ y dejamos solo el nombre de la carpeta
          path: 'frontend'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4