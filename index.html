<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración técnica del documento y codificación de caracteres -->
    <meta charset="UTF-8">
    <title>Repair Station Services - Access Control</title>
    
    <style>
        /* CSS: DEFINICIÓN DE LA IDENTIDAD VISUAL INSTITUCIONAL */
        
        /* Configuración global: Centra el formato en pantalla y define el fondo gris técnico */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e9ecef; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Contenedor Principal (El Marco): Simula una hoja de reporte técnico o formato físico */
        .form-container { 
            background: white; 
            padding: 40px; 
            border: 3px solid #2c3e50; /* Marco grueso industrial */
            box-shadow: 15px 15px 0px #bdc3c7; /* Sombra sólida estilo blueprint */
            width: 450px;
            position: relative;
        }

        /* Encabezado del Formato: Espacio para Logo y División de la Estación */
        .header-station {
            text-align: center;
            border-bottom: 3px double #2c3e50; /* Línea doble divisoria técnica */
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        /* Estilo del Logo: Identificación corporativa de la Estación de Reparación */
        .logo-placeholder {
            font-weight: 900;
            font-size: 28px;
            color: #2c3e50;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Subtítulo de Departamento: Indica la división encargada */
        .department-label {
            margin: 5px 0; 
            font-size: 13px; 
            color: #7f8c8d; 
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Grupos de Formulario: Espaciado entre campos de captura */
        .form-group { margin-bottom: 20px; }

        /* Etiquetas de Campo: Formato en mayúsculas para lectura rápida de técnicos */
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-size: 11px; 
            color: #34495e;
        }

        /* Campos de Entrada: Diseño limpio y profesional para ingreso de datos */
        input { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #bdc3c7; 
            background-color: #fcfcfc;
            font-size: 16px;
        }

        /* Botón de Acción: Representa el comando de validación del sistema */
        button { 
            width: 100%; 
            padding: 15px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s; /* Transición suave al pasar el mouse */
        }

        /* Efecto Hover: Cambio visual al interactuar con el botón */
        button:hover { background: #1a252f; }

        /* Pie del Formato: Referencia de seguridad o versión del documento */
        .footer-ref {
            margin-top: 20px;
            font-size: 9px;
            color: #bdc3c7;
            text-align: right;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- ESTRUCTURA FUNCIONAL DEL FORMULARIO -->
    <div class="form-container">
        
        <!-- Sección de Identificación de la Empresa -->
        <div class="header-station">
            <div class="logo-placeholder">🛠 REPAIR STATION</div>
            <p class="department-label">SERVICES & MAINTENANCE DIVISION</p>
        </div>

        <!-- Título del Documento/Servicio -->
        <h3 style="text-align: center; text-transform: uppercase; color: #2c3e50; margin-bottom: 30px;">
            Control de Acceso de Personal
        </h3>
        
        <!-- Formulario de Envío: Conecta con el Endpoint POST /login definido en app.js -->
        <form action="/login" method="POST">
            
            <!-- Campo de Usuario: Identificador único del técnico/empleado -->
            <div class="form-group">
                <label>ID de Empleado / Técnico:</label>
                <input type="text" name="username" placeholder="Ingrese su ID" required>
            </div>
            
            <!-- Campo de Contraseña: Clave de seguridad enmascarada -->
            <div class="form-group">
                <label>Pin de Seguridad / Password:</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <!-- Disparador de la Petición: Envía los datos al Backend para su procesamiento -->
            <button type="submit">Ejecutar Validación</button>
        </form>

        <!-- Referencia Técnica del Formato -->
        <div class="footer-ref">FORM-RS-001 / REV. 2026</div>
    </div>

</body>
</html>
